<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>MediaPipe Pose Landmark Takibi</title>
    <link href="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/material-components-web@latest/dist/material-components-web.min.js"></script>
</head>
<body>
  <h1>MediaPipe PoseLandmarker ile Vücut Takibi</h1>

  <section id="demos" class="invisible">
    <h2>Demo: Görsel Üzerinde Tespit</h2>
    <p>Vücut hatlarını görmek için aşağıdaki görsellerden birine <b>tıklayın</b>.</p>

    <div class="detectOnClick">
      <img src="https://assets.codepen.io/9177687/woman-ge0f199f92_640.jpg" width="100%" crossorigin="anonymous" title="Tespit için tıkla!" />
    </div>
    <div class="detectOnClick">
      <img src="https://assets.codepen.io/9177687/woman-g1af8d3deb_640.jpg" width="100%" crossorigin="anonymous" title="Tespit için tıkla!" />
    </div>

    <h2>Demo: Canlı Kamera Takibi</h2>
    <p>Gerçek zamanlı takip için kameranızı etkinleştirin.</p>

    <div id="liveView" class="videoView">
      <button id="webcamButton" class="mdc-button mdc-button--raised">
        <span class="mdc-button__ripple"></span>
        <span class="mdc-button__label">KAMERAYI AÇ</span>
      </button>
      <div style="position: relative;">
        <video id="webcam" autoplay playsinline></video>
        <canvas class="output_canvas" id="output_canvas" style="position: absolute; left: 0px; top: 0px;"></canvas>
      </div>
    </div>
  </section>

  <script type="module" src="script.js"></script>
</body>
</html>
